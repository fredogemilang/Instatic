name: page-builder-cms-prod

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-page_builder}
      POSTGRES_USER: ${POSTGRES_USER:-page_builder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting the production stack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${PAGE_BUILDER_IMAGE:-ghcr.io/GITHUB_OWNER/IMAGE_NAME:latest}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://${POSTGRES_USER:-page_builder}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting the production stack}@postgres:5432/${POSTGRES_DB:-page_builder}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env before starting the production stack}
      UPLOADS_DIR: /app/uploads
      STATIC_DIR: /app/dist
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun --eval \"const res = await fetch('http://127.0.0.1:3001/health'); process.exit(res.ok ? 0 : 1)\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
  uploads:
